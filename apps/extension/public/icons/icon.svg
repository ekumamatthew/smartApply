<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="url(#gradient)"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- SA Logo -->
  <text x="64" y="75" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="white">SA</text>
  
  <!-- Briefcase Icon -->
  <g transform="translate(64, 40)">
    <rect x="-20" y="-10" width="40" height="25" rx="3" fill="white" opacity="0.9"/>
    <rect x="-15" y="-15" width="30" height="8" rx="2" fill="white" opacity="0.9"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#3b82f6" stroke-width="2"/>
  </g>
</svg>
