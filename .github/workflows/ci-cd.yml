name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
        
    - name: Install dependencies
      run: bun install
      
    - name: Run linting
      run: bun turbo lint
      
    - name: Run type checking
      run: bun turbo typecheck
      
    - name: Build packages
      run: bun turbo build

  build-web:
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
        
    - name: Install dependencies
      run: bun install
      
    - name: Build web app
      run: bun turbo build --filter=web
      
    - name: Upload web build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: apps/web/.next
        retention-days: 7

  build-extension:
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
        
    - name: Install dependencies
      run: bun install
      
    - name: Build extension
      run: bun turbo build --filter=smartapply-extension
      
    - name: Upload extension build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: extension-build
        path: apps/extension/dist
        retention-days: 7

  build-backend:
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
        
    - name: Install dependencies
      run: bun install
      
    - name: Build backend
      run: cd backend/api && bun run build
      
    - name: Upload backend build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: backend-build
        path: backend/api/dist
        retention-days: 7

  deploy-web:
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download web build artifacts
      uses: actions/download-artifact@v4
      with:
        name: web-build
        path: apps/web/.next
        
    - name: Deploy to production
      run: |
        echo "Deploy web app to production"
        # Add your deployment logic here
        # Example: Vercel, Netlify, AWS S3, etc.

  deploy-extension:
    runs-on: ubuntu-latest
    needs: build-extension
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download extension build artifacts
      uses: actions/download-artifact@v4
      with:
        name: extension-build
        path: apps/extension/dist
        
    - name: Deploy extension
      run: |
        echo "Deploy extension to Chrome Web Store"
        # Add your extension deployment logic here
        # Example: Chrome Web Store API, Firefox Add-ons, etc.

  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download backend build artifacts
      uses: actions/download-artifact@v4
      with:
        name: backend-build
        path: backend/api/dist
        
    - name: Deploy backend
      run: |
        echo "Deploy backend to production"
        # Add your backend deployment logic here
        # Example: Docker, AWS ECS, Railway, etc.
